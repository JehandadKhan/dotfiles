# ~/.tmux.conf
# Managed by chezmoi. Installed binaries (tmux itself) come from
# install-lazyvim.sh; this file only configures behavior + the status bar.

# ---------- prefix ----------
# Ctrl-Space is ergonomic and rarely collides. Keep C-b bound as a
# secondary so muscle memory and stock tmux tutorials still work.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------- general ----------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,xterm-kitty:RGB,wezterm:RGB"

# image.nvim (and any other terminal-graphics passthrough) needs this on
# tmux 3.3+, otherwise :checkhealth image.nvim errors with
# "tmux does not have allow-passthrough enabled" and plots never render.
# -q makes older tmux versions ignore the unknown option silently.
set -gq allow-passthrough on

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10           # faster <Esc> for nvim
set -g focus-events on          # let nvim's autoread fire on focus change
setw -g mode-keys vi

# Reload config without restart.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---------- clipboard ----------
# OSC 52: modern terminals (kitty/wezterm/ghostty/iTerm2/Alacritty) accept
# this escape and put the copy directly on the system clipboard — works
# over ssh, doesn't need an external helper. Older terminals just ignore it.
set -s set-clipboard on

# Belt-and-braces: also pipe `y` in copy-mode through the OS clipboard tool,
# so terminals that don't honor OSC 52 still get the copy. install-lazyvim.sh
# installs xclip + wl-clipboard on Linux; macOS has pbcopy built in.
if-shell 'command -v pbcopy'   'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v wl-copy'  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v xclip'    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
# Also copy on mouse-drag release (same pipe). Without this, drag-select
# stays in tmux's internal buffer only.
if-shell 'command -v pbcopy'   'bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v wl-copy'  'bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v xclip'    'bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'

# Splits that inherit the current pane's cwd. The defaults open in the
# directory tmux was started from, which is rarely what you want.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vi-style pane navigation (h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------- status bar (catppuccin-mocha-ish palette, no plugins) ----------
# Colors picked to match the starship two-line theme below. If you want a
# full themed look later, swap this block for catppuccin/tmux via TPM.
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Base bar.
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name in a coloured pill.
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: host + clock.
set -g status-right-length 80
set -g status-right "#[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e] #h #[bg=#cba6f7,fg=#1e1e2e] %Y-%m-%d %H:%M "

# Windows.
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bg=#f9e2af,fg=#1e1e2e,bold] #I:#W "
setw -g window-status-separator ""

# Panes.
set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Messages / command line.
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"
